<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stranger Things</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cinzel', serif;
    }

    body{
      overflow:hidden;
      background:black;
      color:white;
    }

    .hero{
      width:100%;
      height:100vh;
      background:
      linear-gradient(to right, rgba(0,0,0,0.5), rgba(0,0,0,0.2)),
      url('https://images6.alphacoders.com/127/1275267.jpg');
      background-size:cover;
      background-position:center;
      position:relative;
    }

    nav{
      width:100%;
      padding:25px 70px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:absolute;
      top:0;
      left:0;
      z-index:10;
    }

    .logo{
      color:#ff2d2d;
      font-size:32px;
      font-weight:bold;
      letter-spacing:3px;
    }

    nav ul{
      display:flex;
      list-style:none;
      gap:40px;
    }

    nav ul li a{
      text-decoration:none;
      color:white;
      font-size:18px;
      transition:0.3s;
    }

    nav ul li a:hover{
      color:#ff2d2d;
    }

    .content{
      position:absolute;
      top:50%;
      left:70px;
      transform:translateY(-50%);
      max-width:500px;
    }

    .content h1{
      font-size:80px;
      color:#ff2d2d;
      line-height:90px;
      margin-bottom:20px;
      text-shadow:0 0 20px red;
    }

    .content p{
      font-size:18px;
      line-height:30px;
      color:#ddd;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:#ff2d2d;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-size:18px;
      transition:0.3s;
      box-shadow:0 0 15px red;
    }

    .btn:hover{
      background:white;
      color:black;
      transform:scale(1.05);
    }

    .overlay-text{
      position:absolute;
      bottom:60px;
      right:70px;
      font-size:50px;
      color:rgba(255,255,255,0.15);
      font-weight:bold;
      text-shadow:0 0 20px rgba(255,0,0,0.5);
    }

    @media(max-width:900px){

      nav{
        padding:20px;
      }

      nav ul{
        gap:15px;
      }

      .content{
        left:20px;
        right:20px;
      }

      .content h1{
        font-size:50px;
        line-height:60px;
      }

      .content p{
        font-size:15px;
        line-height:25px;
      }

      .overlay-text{
        font-size:30px;
        right:20px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <nav>
      <div class="logo">STRANGER THINGS</div>

      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Characters</a></li>
        <li><a href="#">Episodes</a></li>
        <li><a href="#">Upside Down</a></li>
      </ul>
    </nav>

    <div class="content">
      <h1>STRANGER<br>THINGS</h1>

      <p>
        In Hawkins, Indiana, a group of kids uncover terrifying supernatural mysteries,
        secret experiments, and a dangerous parallel world called the Upside Down.
      </p>

      <a href="#" class="btn">Enter The Upside Down</a>
    </div>

    <div class="overlay-text">
      THE MIND FLAYER
    </div>

  </section>

</body>
</html>
